version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: wellness-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: wellness_store
    volumes:
      - mongodb_data:/data/db
    networks:
      - wellness-network

  backend:
    build: ./backend
    container_name: wellness-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/wellness_store?authSource=admin
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      PORT: 5000
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - wellness-network

  frontend:
    build: ./frontend
    container_name: wellness-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - wellness-network

volumes:
  mongodb_data:

networks:
  wellness-network:
    driver: bridge