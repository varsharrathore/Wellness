version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: wellness-mongo-prod
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-strongpassword123}
      MONGO_INITDB_DATABASE: wellness_store
    volumes:
      - mongodb_data:/data/db
    networks:
      - wellness-network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: wellness-backend-prod
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:${MONGO_PASSWORD:-strongpassword123}@mongodb:27017/wellness_store?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your-production-jwt-secret-change-this}
      PORT: 5000
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - wellness-network

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wellness-frontend-prod
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:5000/api}
    depends_on:
      - backend
    networks:
      - wellness-network

  nginx:
    image: nginx:alpine
    container_name: wellness-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - wellness-network

volumes:
  mongodb_data:

networks:
  wellness-network:
    driver: bridge